name: 功能建议
description: 提一个新功能或改进
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 想解决的问题
      description: 这个功能要解决什么痛点？
      placeholder: 我希望能在会话管理器里按项目分组 codex 会话……
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 设想的方案
      description: 你期望它怎么工作？
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: 涉及方向
      options:
        - codex 交互体验 (折叠 / chip / 会话)
        - 部署 / 自动接入
        - UI / 主题
        - 后端 / API
        - 文档
        - 其他
    validations:
      required: true
  - type: checkboxes
    id: noncommercial
    attributes:
      label: 许可确认
      options:
        - label: 我理解本项目为非商用 license（PolyForm Noncommercial）
          required: true

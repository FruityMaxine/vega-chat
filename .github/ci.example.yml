name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          # 运行时依赖 (测试本身仅用 stdlib, 但装上更贴近真实环境)
          pip install -r scripts/requirements.txt || true

      - name: Run vega-codex-proxy test suite
        working-directory: vega-codex-proxy
        run: pytest tests/ -q -p no:cacheprovider

  lint:
    name: syntax check (py_compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Byte-compile all Python sources
        run: |
          python -m compileall -q vega-codex-proxy vega-admin/backend
